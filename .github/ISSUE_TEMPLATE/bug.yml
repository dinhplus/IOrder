name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior"
title: "[Bug]: "
labels: ["type:bug", "prio:P1"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area is affected?
      options:
        - Backend (Go/Gin)
        - Frontend (Next.js)
        - Mobile (React Native)
        - Infrastructure / CI
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - P0 — Critical (app down / data loss)
        - P1 — High (major feature broken)
        - P2 — Normal (minor issue, workaround exists)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: "When I do X, I expect Y but instead Z happens."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, device, Go/Node version, etc.
      placeholder: |
        - OS: macOS 15
        - Browser: Chrome 130
        - Go: 1.23
        - Node: 22
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs, error messages, or screenshots.
    validations:
      required: false
