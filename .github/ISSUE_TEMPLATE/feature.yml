name: "🚀 Feature Request"
description: "Request a new feature or enhancement"
title: "[Feature]: "
labels: ["type:feature", "prio:P2"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this feature belong to?
      options:
        - Backend (Go/Gin)
        - Frontend (Next.js)
        - Mobile (React Native)
        - Infrastructure / CI
        - Cross-platform
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this feature?
      options:
        - P0 — Critical (must have this sprint)
        - P1 — High (should have this sprint)
        - P2 — Normal (nice to have)
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: Rough effort estimate
      options:
        - XS (< 2 hours)
        - S (2-4 hours)
        - M (4-8 hours)
        - Needs breakdown (> 1 day)
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story / Description
      description: |
        As a [role], I want [feature] so that [benefit].
        Or describe the feature clearly.
      placeholder: "As a user, I want to..."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Clear, testable criteria for this feature to be considered done.
      placeholder: |
        - [ ] Given [context], when [action], then [result]
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Any technical considerations, API endpoints, DB changes, etc.
      placeholder: "Endpoint: POST /api/v1/... | DB migration needed: ..."
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Any blocking issues or dependencies?
      placeholder: "Blocked by #XX | Depends on API contract from #YY"
    validations:
      required: false
